<main class="app-shell" [class.aside-open]="isAsideOpen" [class.aside-closed]="!isAsideOpen">
  <header class="header-area">
    <app-header (toggleAside)="isAsideOpen = !isAsideOpen"></app-header>
  </header>

  <aside class="aside-area">
    <app-aside></app-aside>
  </aside>

  <content class="main-area">
    <router-outlet>
      <app-content></app-content>
    </router-outlet>
  </content>

  <footer class="footer-area">
    <app-footer></app-footer>
  </footer>
</main>
