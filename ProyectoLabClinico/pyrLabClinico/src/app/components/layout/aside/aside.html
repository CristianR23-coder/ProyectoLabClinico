<aside class="h-screen w-56 shrink-0 bg-[#1f3b99] text-white flex flex-col shadow-[0_6px_24px_rgba(0,0,0,0.18)]">
  <!-- HEADER DEL ASIDE -->
  <div class="h-14 px-4 flex items-center gap-2 border-b border-white/15">
    <img src="logo.png" alt="Laboratorio" class="h-8" />
    <span class="font-bold tracking-wide">
      Lab<span class="text-emerald-400">PRO</span>
    </span>
  </div>

  <!-- SECCIÓN (como en el modelo) -->
  <h6 class="px-4 pt-3 text-xs font-semibold text-white/70">GENERAL</h6>

  <!-- MENÚ -->
  <div class="flex-1 overflow-y-auto px-2 py-2">
    <!-- Usa esta clase para “enganchar” estilos de PrimeNG -->
    <p-panelMenu [model]="items" styleClass="sidebar-menu"></p-panelMenu>
  </div>

  <!-- FOOTER opcional -->
  <div class="h-10 px-4 flex items-center text-[11px] text-white/70 border-t border-white/10">
    v1.0.1
  </div>
</aside>
